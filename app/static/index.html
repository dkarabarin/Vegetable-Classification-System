<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable Classification API - Интерфейс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f7f7ff;
            border-color: #764ba2;
        }

        .upload-area.drag-over {
            background: #e8eaff;
            border-color: #764ba2;
        }

        .image-preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }

        .model-select {
            margin: 20px 0;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .probability-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 30px;
            margin: 10px 0;
            overflow: hidden;
        }

        .probability-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-size: 12px;
            transition: width 0.3s;
        }

        .similarity-score {
            font-size: 48px;
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
        }

        .high-similarity { color: #28a745; }
        .medium-similarity { color: #ffc107; }
        .low-similarity { color: #dc3545; }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .heatmap-container {
            text-align: center;
            margin-top: 20px;
        }

        .heatmap-image {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥕 Vegetable Classification API</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('classify')">Классификация</button>
            <button class="tab-btn" onclick="switchTab('similarity')">Сравнение</button>
            <button class="tab-btn" onclick="switchTab('gradcam')">Grad-CAM</button>
        </div>

        <!-- Классификация -->
        <div id="classify-tab" class="tab-content active">
            <div class="card">
                <h2>📷 Классификация овощей</h2>
                <div class="upload-area" id="classify-upload">
                    <p>📁 Нажмите или перетащите изображение</p>
                    <input type="file" id="classify-file" accept="image/*" style="display:none">
                </div>
                <img id="classify-preview" class="image-preview">
                
                <select id="classify-model" class="model-select">
                    <option value="custom">Custom CNN</option>
                    <option value="pretrained">ResNet50 (Pretrained)</option>
                </select>
                
                <button id="classify-btn" onclick="classifyImage()" disabled>Классифицировать</button>
                
                <div id="classify-results" class="results"></div>
            </div>
        </div>

        <!-- Сравнение -->
        <div id="similarity-tab" class="tab-content">
            <div class="card">
                <h2>🔍 Сравнение изображений</h2>
                <div class="grid-2">
                    <div>
                        <h3>Изображение 1</h3>
                        <div class="upload-area" id="similarity-upload1">
                            <p>📁 Нажмите или перетащите</p>
                            <input type="file" id="similarity-file1" accept="image/*" style="display:none">
                        </div>
                        <img id="similarity-preview1" class="image-preview">
                    </div>
                    <div>
                        <h3>Изображение 2</h3>
                        <div class="upload-area" id="similarity-upload2">
                            <p>📁 Нажмите или перетащите</p>
                            <input type="file" id="similarity-file2" accept="image/*" style="display:none">
                        </div>
                        <img id="similarity-preview2" class="image-preview">
                    </div>
                </div>
                
                <select id="similarity-model" class="model-select">
                    <option value="custom">Custom CNN</option>
                    <option value="pretrained">ResNet50 (Pretrained)</option>
                </select>
                
                <button id="similarity-btn" onclick="compareImages()" disabled>Сравнить</button>
                
                <div id="similarity-results" class="results"></div>
            </div>
        </div>

        <!-- Grad-CAM -->
        <div id="gradcam-tab" class="tab-content">
            <div class="card">
                <h2>🔬 Grad-CAM визуализация</h2>
                <div class="upload-area" id="gradcam-upload">
                    <p>📁 Нажмите или перетащите изображение</p>
                    <input type="file" id="gradcam-file" accept="image/*" style="display:none">
                </div>
                <img id="gradcam-preview" class="image-preview">
                
                <select id="gradcam-model" class="model-select">
                    <option value="custom">Custom CNN</option>
                    <option value="pretrained">ResNet50 (Pretrained)</option>
                </select>
                
                <button id="gradcam-btn" onclick="generateGradCAM()" disabled>Сгенерировать Grad-CAM</button>
                
                <div id="gradcam-results" class="results"></div>
            </div>
        </div>
    </div>

    <div class="status" id="status">✅ Сервис готов</div>

    <script>
        // Состояние
        let state = {
            classify: { file: null },
            similarity: { file1: null, file2: null },
            gradcam: { file: null }
        };

        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        // Настройка загрузки файлов
        function setupUpload(uploadId, fileInputId, previewId, type) {
            const uploadDiv = document.getElementById(uploadId);
            const fileInput = document.getElementById(fileInputId);
            const preview = document.getElementById(previewId);

            uploadDiv.onclick = () => fileInput.click();
            
            uploadDiv.ondragover = (e) => {
                e.preventDefault();
                uploadDiv.classList.add('drag-over');
            };
            
            uploadDiv.ondragleave = () => {
                uploadDiv.classList.remove('drag-over');
            };
            
            uploadDiv.ondrop = (e) => {
                e.preventDefault();
                uploadDiv.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    handleFile(file, fileInput, preview, type);
                }
            };
            
            fileInput.onchange = (e) => {
                if (e.target.files[0]) {
                    handleFile(e.target.files[0], fileInput, preview, type);
                }
            };
        }

        function handleFile(file, fileInput, preview, type) {
            // Сохраняем файл в состояние
            if (type === 'classify') {
                state.classify.file = file;
                document.getElementById('classify-btn').disabled = false;
            } else if (type === 'similarity1') {
                state.similarity.file1 = file;
                checkSimilarityButton();
            } else if (type === 'similarity2') {
                state.similarity.file2 = file;
                checkSimilarityButton();
            } else if (type === 'gradcam') {
                state.gradcam.file = file;
                document.getElementById('gradcam-btn').disabled = false;
            }
            
            // Показываем превью
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function checkSimilarityButton() {
            const btn = document.getElementById('similarity-btn');
            btn.disabled = !(state.similarity.file1 && state.similarity.file2);
        }

        // Классификация
        async function classifyImage() {
            if (!state.classify.file) return;
            
            const btn = document.getElementById('classify-btn');
            const resultsDiv = document.getElementById('classify-results');
            const model = document.getElementById('classify-model').value;
            
            showLoading(btn);
            
            const formData = new FormData();
            formData.append('file', state.classify.file);
            formData.append('model_type', model);
            
            try {
                const response = await fetch('/classify', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayClassificationResults(data, resultsDiv);
                } else {
                    resultsDiv.innerHTML = `<div style="color:red">Ошибка: ${data.detail}</div>`;
                    resultsDiv.style.display = 'block';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div style="color:red">Ошибка: ${error.message}</div>`;
                resultsDiv.style.display = 'block';
            } finally {
                hideLoading(btn);
            }
        }
        
        function displayClassificationResults(data, container) {
            const top3 = data.top_3_predictions;
            let html = `
                <h3>✅ Результат</h3>
                <p><strong>Предсказанный класс:</strong> ${data.predicted_class}</p>
                <p><strong>Уверенность:</strong> ${(data.confidence * 100).toFixed(2)}%</p>
                <p><strong>Использованная модель:</strong> ${data.model_used}</p>
                <h4>Топ-3 предсказания:</h4>
            `;
            
            top3.forEach(pred => {
                const percent = (pred.probability * 100).toFixed(2);
                html += `
                    <div class="probability-bar">
                        <div class="probability-fill" style="width: ${percent}%">
                            ${pred.class}: ${percent}%
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            container.style.display = 'block';
        }
        
        // Сравнение
        async function compareImages() {
            if (!state.similarity.file1 || !state.similarity.file2) return;
            
            const btn = document.getElementById('similarity-btn');
            const resultsDiv = document.getElementById('similarity-results');
            const model = document.getElementById('similarity-model').value;
            
            showLoading(btn);
            
            const formData = new FormData();
            formData.append('file1', state.similarity.file1);
            formData.append('file2', state.similarity.file2);
            formData.append('model_type', model);
            
            try {
                const response = await fetch('/similarity', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displaySimilarityResults(data, resultsDiv);
                } else {
                    resultsDiv.innerHTML = `<div style="color:red">Ошибка: ${data.detail}</div>`;
                    resultsDiv.style.display = 'block';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div style="color:red">Ошибка: ${error.message}</div>`;
                resultsDiv.style.display = 'block';
            } finally {
                hideLoading(btn);
            }
        }
        
        function displaySimilarityResults(data, container) {
            const score = data.similarity_score;
            let scoreClass = '';
            if (score > 0.7) scoreClass = 'high-similarity';
            else if (score > 0.3) scoreClass = 'medium-similarity';
            else scoreClass = 'low-similarity';
            
            const html = `
                <h3>📊 Результат сравнения</h3>
                <div class="similarity-score ${scoreClass}">
                    ${(score * 100).toFixed(1)}%
                </div>
                <p><strong>Интерпретация:</strong> ${data.interpretation}</p>
                <p><strong>Использованная модель:</strong> ${data.model_used}</p>
                <p><small>Шкала: от -1 до 1, где 1 = идентичные</small></p>
            `;
            
            container.innerHTML = html;
            container.style.display = 'block';
        }
        
        // Grad-CAM
        async function generateGradCAM() {
            if (!state.gradcam.file) return;
            
            const btn = document.getElementById('gradcam-btn');
            const resultsDiv = document.getElementById('gradcam-results');
            const model = document.getElementById('gradcam-model').value;
            
            showLoading(btn);
            
            const formData = new FormData();
            formData.append('file', state.gradcam.file);
            formData.append('model_type', model);
            
            try {
                const response = await fetch('/gradcam', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayGradCAMResults(data, resultsDiv);
                } else {
                    resultsDiv.innerHTML = `<div style="color:red">Ошибка: ${data.detail}</div>`;
                    resultsDiv.style.display = 'block';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div style="color:red">Ошибка: ${error.message}</div>`;
                resultsDiv.style.display = 'block';
            } finally {
                hideLoading(btn);
            }
        }
        
        function displayGradCAMResults(data, container) {
            const html = `
                <h3>🔥 Grad-CAM Визуализация</h3>
                <p><strong>Предсказанный класс:</strong> ${data.predicted_class}</p>
                <p><strong>Целевой класс:</strong> ${data.target_class}</p>
                <p><strong>Уверенность:</strong> ${(data.confidence * 100).toFixed(2)}%</p>
                <div class="heatmap-container">
                    <img src="data:image/png;base64,${data.heatmap_base64}" class="heatmap-image">
                </div>
            `;
            
            container.innerHTML = html;
            container.style.display = 'block';
        }
        
        // UI helpers
        function showLoading(btn) {
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = `${originalText} <span class="loading"></span>`;
        }
        
        function hideLoading(btn) {
            btn.disabled = false;
            btn.innerHTML = btn.innerHTML.replace(' <span class="loading"></span>', '');
        }
        
        // Инициализация
        setupUpload('classify-upload', 'classify-file', 'classify-preview', 'classify');
        setupUpload('similarity-upload1', 'similarity-file1', 'similarity-preview1', 'similarity1');
        setupUpload('similarity-upload2', 'similarity-file2', 'similarity-preview2', 'similarity2');
        setupUpload('gradcam-upload', 'gradcam-file', 'gradcam-preview', 'gradcam');
        
        // Проверка статуса сервера
        async function checkStatus() {
            try {
                const response = await fetch('/ping');
                const data = await response.json();
                document.getElementById('status').innerHTML = '✅ Сервис работает';
                document.getElementById('status').style.background = '#28a745';
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Нет соединения с сервером';
                document.getElementById('status').style.background = '#dc3545';
            }
        }
        
        checkStatus();
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
