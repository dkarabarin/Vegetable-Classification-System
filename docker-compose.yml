
version: '3.8'

services:
  vegetable-api:
    build: .
    container_name: vegetable-classifier
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./app/static:/app/app/static
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s